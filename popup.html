<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>Volume Control</title>
  <link rel="stylesheet" href="popup.css"/>
</head>
<body>
  <div id="popup-content">
    <div class="exclusion-message hidden">
        Volume Control is disabled for this site.
    </div>
    
    <div class="top-controls">
      <input type="range" id="volume-slider" value="0" min="-32" max="32" step="1" aria-label="Volume control" aria-describedby="volume-limit-note" aria-keyshortcuts="Alt+Shift+ArrowUp Alt+Shift+ArrowDown Alt+Shift+0" title="Alt+Shift+Up / Alt+Shift+Down / Alt+Shift+0">
      <p id="volume-limit-note" class="volume-limit-note hidden" role="status">
        Boosting and mono may be unavailable on this media because the browser only allows fallback volume control. You can still lower volume.
      </p>
      <input type="text" id="volume-text" value="0 dB" aria-label="Volume in decibels">
    </div>

    <div class="bot-controls"> 
      <div class="left">
          <label class="switch-container" for="mono-checkbox" title="Toggle Mono Audio (Alt+Shift+M)">
              <div class="switch">
                  <input type="checkbox" id="mono-checkbox" aria-keyshortcuts="Alt+Shift+M">
                  <span class="slider"></span>
              </div>
              <span class="label-text">Mono</span>
          </label>

          <label class="switch-container" for="remember-checkbox" title="Remember volume for this site">
              <div class="switch">
                  <input type="checkbox" id="remember-checkbox">
                  <span class="slider"></span>
              </div>
              <span class="label-text">Remember</span>
          </label>
      </div>

      <div class="right">
          <label class="switch-container" for="enable-checkbox" title="Enable/Disable on this site">
              <div class="switch">
                  <input type="checkbox" id="enable-checkbox" checked>
                  <span class="slider"></span>
              </div>
              <span class="label-text">Active</span>
          </label>
          
          <button id="settings" class="settings" aria-label="Open settings">Settings</button>
      </div>
    </div>
  </div>

  <div id="error-content" class="hidden">
    <p></p>
  </div>
  <script src="popup.js"></script>
</body>
</html>
